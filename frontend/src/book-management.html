<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LibMetrics — Book Management</title>
    <link rel="stylesheet" href="./output.css" />
    <script src="./app.js"></script>
  </head>
  <body>
    <script>window.LibMetrics.requireRole(["librarian"]);</script>

    <header class="topbar">
      <div class="container-page flex h-14 items-center justify-between">
        <div class="flex items-center gap-6">
          <a href="./librarian-dashboard.html" class="text-sm font-semibold tracking-tight" style="color: var(--color-text)">LibMetrics</a>
          <nav class="hidden items-center gap-6 sm:flex">
            <a class="navlink" href="./librarian-dashboard.html">Dashboard</a>
            <a class="navlink" href="./librarian-students.html">Students</a>
            <a class="navlink" aria-current="page" href="./book-management.html">Books</a>
          </nav>
        </div>
        <a class="btn btn-secondary" data-signout href="./librarian-login.html">Sign out</a>
      </div>
    </header>

    <main class="container-page py-8">
      <section class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Books</h1>
          <p class="mt-1 text-sm" style="color: var(--color-muted)">Upload and manage PDF books.</p>
        </div>
        <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row sm:items-center">
          <input id="bookSearch" class="input w-full sm:w-64" type="search" placeholder="Search by title or author" />
          <button id="addBookBtn" class="btn btn-primary whitespace-nowrap" type="button">Add New Book</button>
        </div>
      </section>

      <p id="pageError" class="mt-4 hidden text-sm" style="color: #b91c1c"></p>

      <section class="mt-6 overflow-auto">
        <table class="table min-w-[760px]">
          <thead>
            <tr>
              <th>Cover</th>
              <th>Title</th>
              <th>Author</th>
              <th>Pages</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="booksTbody"></tbody>
        </table>
      </section>
    </main>

    <div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle" data-open="false">
      <div class="modal">
        <div class="flex items-start justify-between gap-3">
          <div>
            <h2 id="modalTitle" class="text-lg font-semibold">Add New Book</h2>
            <p class="mt-1 text-sm" style="color: var(--color-muted)">PDF only, max 25MB.</p>
          </div>
          <button id="closeModalX" class="btn btn-secondary" type="button" aria-label="Close">Close</button>
        </div>

        <p id="modalError" class="mt-3 hidden rounded border px-3 py-2 text-sm" style="border-color: #fecaca; background: #fef2f2; color: #b91c1c"></p>

        <form id="addBookForm" class="mt-4 space-y-3">
          <label class="block">
            <span class="text-sm font-medium">Title</span>
            <input class="input mt-1" name="title" required />
          </label>
          <label class="block">
            <span class="text-sm font-medium">Author</span>
            <input class="input mt-1" name="author" required />
          </label>
          <label class="block">
            <span class="text-sm font-medium">Description</span>
            <input class="input mt-1" name="description" />
          </label>
          <label class="block">
            <span class="text-sm font-medium">Total pages (optional)</span>
            <input class="input mt-1" name="total_pages" type="number" min="1" placeholder="Auto-detected from PDF" />
            <p class="field-hint">Leave blank to detect page count automatically from the PDF.</p>
          </label>
          <label class="block">
            <span class="text-sm font-medium">PDF file</span>
            <input class="input mt-1" name="file" type="file" accept="application/pdf,.pdf" required />
          </label>
          <div class="mt-4 flex items-center justify-end gap-2">
            <button id="cancelModal" class="btn btn-secondary" type="button">Cancel</button>
            <button class="btn btn-primary" type="submit">Upload Book</button>
          </div>
        </form>
      </div>
    </div>

    <script>
      (async function () {
        const tbody = document.getElementById("booksTbody");
        const search = document.getElementById("bookSearch");
        const pageError = document.getElementById("pageError");
        const backdrop = document.getElementById("modalBackdrop");
        const form = document.getElementById("addBookForm");
        const modalError = document.getElementById("modalError");
        let books = [];

        function render(list) {
          tbody.innerHTML = list.map((book) => `
            <tr data-title="${book.title}" data-author="${book.author}">
              <td><img class="h-10 w-8 rounded border bg-white object-cover" style="border-color: var(--color-border)" alt="${book.title}" src="${LibMetrics.bookCoverSvg(book.title)}" /></td>
              <td class="font-medium">${book.title}</td>
              <td>${book.author}</td>
              <td>${book.total_pages}</td>
              <td><button class="btn btn-secondary text-xs" type="button" data-delete="${book.id}">Delete</button></td>
            </tr>`).join("") || `<tr><td colspan="5" style="color: var(--color-muted)">No books uploaded yet.</td></tr>`;

          tbody.querySelectorAll("[data-delete]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              if (!confirm("Soft-delete this book?")) return;
              try {
                await LibMetrics.api.deleteBook(Number(btn.dataset.delete));
                await loadBooks();
              } catch (err) {
                LibMetrics.showError(pageError, err.message);
              }
            });
          });
        }

        async function loadBooks() {
          books = await LibMetrics.api.getBooks();
          render(books);
        }

        function openModal() { backdrop.dataset.open = "true"; }
        function closeModal() {
          backdrop.dataset.open = "false";
          form.reset();
          LibMetrics.showError(modalError, "");
        }

        document.getElementById("addBookBtn").addEventListener("click", openModal);
        document.getElementById("closeModalX").addEventListener("click", closeModal);
        document.getElementById("cancelModal").addEventListener("click", closeModal);
        backdrop.addEventListener("click", (e) => { if (e.target === backdrop) closeModal(); });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const data = new FormData(form);
          const file = data.get("file");
          if (!file || !file.size) {
            LibMetrics.showError(modalError, "Please select a PDF file.");
            return;
          }
          const uploadData = new FormData();
          uploadData.append("title", String(data.get("title")));
          uploadData.append("author", String(data.get("author")));
          uploadData.append("description", String(data.get("description") || ""));
          const pages = data.get("total_pages");
          if (pages) uploadData.append("total_pages", String(pages));
          uploadData.append("file", file);
          try {
            await LibMetrics.api.uploadBook(uploadData);
            closeModal();
            await loadBooks();
          } catch (err) {
            LibMetrics.showError(modalError, err.message);
          }
        });

        search.addEventListener("input", () => {
          const q = search.value.trim().toLowerCase();
          const filtered = books.filter(
            (b) => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)
          );
          render(filtered);
        });

        try {
          await loadBooks();
        } catch (err) {
          LibMetrics.showError(pageError, err.message);
        }
      })();
    </script>
  </body>
</html>
