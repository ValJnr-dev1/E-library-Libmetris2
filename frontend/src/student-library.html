<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LibMetrics — Library</title>
    <link rel="stylesheet" href="./output.css" />
    <script src="./app.js"></script>
  </head>
  <body>
    <script>window.LibMetrics.requireRole(["student"]);</script>

    <header class="topbar">
      <div class="container-page flex h-14 items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="./student-dashboard.html" class="text-sm font-semibold tracking-tight" style="color: var(--color-text)">LibMetrics</a>
          <nav class="hidden items-center gap-6 sm:flex">
            <a class="navlink" href="./student-dashboard.html">Dashboard</a>
            <a class="navlink" aria-current="page" href="./student-library.html">Library</a>
            <a class="navlink" href="./student-analytics.html">Analytics</a>
          </nav>
        </div>
        <div class="flex items-center gap-3">
          <button id="mobileMenuBtn" class="sm:hidden flex items-center justify-center w-8 h-8" style="background: none; cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <a class="btn btn-secondary hidden sm:inline-block" data-signout href="./student-login.html">Sign out</a>
        </div>
      </div>
      <nav id="mobileMenu" class="sm:hidden hidden bg-white border-t" style="border-color: var(--color-border);">
        <div class="container-page py-2 space-y-1">
          <a class="block px-3 py-2 text-sm rounded" href="./student-dashboard.html">Dashboard</a>
          <a class="block px-3 py-2 text-sm rounded" href="./student-library.html">Library</a>
          <a class="block px-3 py-2 text-sm rounded" href="./student-analytics.html">Analytics</a>
          <a class="block px-3 py-2 text-sm rounded" data-signout href="./student-login.html">Sign out</a>
        </div>
      </nav>
    </header>
    <script>
      document.getElementById('mobileMenuBtn').addEventListener('click', function() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('hidden');
      });
      document.querySelectorAll('#mobileMenu a').forEach(link => {
        link.addEventListener('click', function() {
          document.getElementById('mobileMenu').classList.add('hidden');
        });
      });
    </script>

    <main class="container-page py-6 sm:py-8">
      <div class="flex flex-col gap-3 sm:gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Library</h1>
          <p class="mt-1 text-sm" style="color: var(--color-muted)">Browse books available to you.</p>
        </div>
        <input id="librarySearch" class="input w-full sm:w-72 text-sm" type="search" placeholder="Search by title or author" />
      </div>

      <section id="libraryGrid" class="mt-6 grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></section>
      <p id="libraryError" class="mt-4 hidden text-sm" style="color: #b91c1c"></p>
    </main>

    <script>
      (async function () {
        const grid = document.getElementById("libraryGrid");
        const search = document.getElementById("librarySearch");
        let books = [];

        function render(list) {
          if (!list.length) {
            grid.innerHTML = `<p class="text-sm" style="color: var(--color-muted)">No books found.</p>`;
            return;
          }
          grid.innerHTML = list.map((book) => `
            <article class="card flex gap-4 w-full max-w-full" data-title="${book.title}" data-author="${book.author}">
                <img class="h-20 w-14 shrink-0 rounded border bg-white object-cover shadow-sm" style="border-color: var(--color-border)" alt="${book.title}" src="${LibMetrics.bookCoverSvg(book.title)}" />
                <div class="min-w-0 flex-1">
                  <h2 class="text-sm font-semibold text-break">${book.title}</h2>
                  <p class="mt-1 text-sm text-break" style="color: var(--color-muted)">${book.author}</p>
                  <p class="mt-2 text-sm text-break" style="color: var(--color-muted)">${book.description || "No description."}</p>
                <p class="mt-2 text-xs" style="color: var(--color-muted)">${book.total_pages} pages</p>
                <a class="btn btn-primary mt-3 inline-block" href="./e-reader.html?book_id=${book.id}">Open Reader</a>
              </div>
            </article>`).join("");
        }

        search.addEventListener("input", () => {
          const q = search.value.trim().toLowerCase();
          const filtered = books.filter(
            (b) => b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q)
          );
          render(filtered);
        });

        try {
          books = await LibMetrics.api.getBooks();
          render(books);
        } catch (err) {
          LibMetrics.showError(document.getElementById("libraryError"), err.message);
        }
      })();
    </script>
  </body>
</html>
