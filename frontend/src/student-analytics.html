<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LibMetrics — Student Analytics</title>
    <link rel="stylesheet" href="./output.css" />
    <script src="./app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <script>window.LibMetrics.requireRole(["student"]);</script>

    <header class="topbar">
      <div class="container-page flex h-14 items-center justify-between">
        <div class="flex items-center gap-4">
          <a href="./student-dashboard.html" class="text-sm font-semibold tracking-tight" style="color: var(--color-text)">LibMetrics</a>
          <nav class="hidden items-center gap-6 sm:flex">
            <a class="navlink" href="./student-dashboard.html">Dashboard</a>
            <a class="navlink" href="./student-library.html">Library</a>
            <a class="navlink" aria-current="page" href="./student-analytics.html">Analytics</a>
          </nav>
        </div>
        <div class="flex items-center gap-3">
          <button id="mobileMenuBtn" class="sm:hidden flex items-center justify-center w-8 h-8" style="background: none; cursor: pointer;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
          </button>
          <a class="btn btn-secondary hidden sm:inline-block" data-signout href="./student-login.html">Sign out</a>
        </div>
      </div>
      <nav id="mobileMenu" class="sm:hidden hidden bg-white border-t" style="border-color: var(--color-border);">
        <div class="container-page py-2 space-y-1">
          <a class="block px-3 py-2 text-sm rounded" href="./student-dashboard.html">Dashboard</a>
          <a class="block px-3 py-2 text-sm rounded" href="./student-library.html">Library</a>
          <a class="block px-3 py-2 text-sm rounded" href="./student-analytics.html">Analytics</a>
          <a class="block px-3 py-2 text-sm rounded" data-signout href="./student-login.html">Sign out</a>
        </div>
      </nav>
    </header>
    <script>
      document.getElementById('mobileMenuBtn').addEventListener('click', function() {
        const menu = document.getElementById('mobileMenu');
        menu.classList.toggle('hidden');
      });
      document.querySelectorAll('#mobileMenu a').forEach(link => {
        link.addEventListener('click', function() {
          document.getElementById('mobileMenu').classList.add('hidden');
        });
      });
    </script>

    <main class="container-page py-6 sm:py-8">
      <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Analytics</h1>
          <p class="mt-1 text-sm" style="color: var(--color-muted)">Your reading habits.</p>
        </div>
        <a class="btn btn-secondary w-full sm:w-auto" href="./student-dashboard.html">Back to Dashboard</a>
      </div>

      <section class="mt-6 grid gap-3 sm:grid-cols-3">
        <div class="card">
          <p class="text-sm font-medium">Books finished</p>
          <p id="statBooksRead" class="mt-2 text-2xl font-semibold">—</p>
        </div>
        <div class="card">
          <p class="text-sm font-medium">Total reading time</p>
          <p id="statMinutes" class="mt-2 text-2xl font-semibold">—</p>
        </div>
        <div class="card">
          <p class="text-sm font-medium">Current streak</p>
          <p id="statStreak" class="mt-2 text-2xl font-semibold">—</p>
        </div>
        <div class="card sm:col-span-3 lg:col-span-1">
          <p class="text-sm font-medium">Avg. minutes per page</p>
          <p id="statMinsPerPage" class="mt-2 text-2xl font-semibold">—</p>
        </div>
      </section>

      <section class="mt-6 grid gap-4 lg:grid-cols-2">
        <div class="card">
          <h2 class="text-sm font-semibold">Book progress</h2>
          <div class="mt-3">
            <canvas id="chartProgress" height="160"></canvas>
          </div>
        </div>
        <div class="card">
          <h2 class="text-sm font-semibold">Completion overview</h2>
          <ul id="progressList" class="mt-3 space-y-2 text-sm"></ul>
        </div>
      </section>

      <section class="mt-6 card">
        <h2 class="text-lg font-semibold">Insights</h2>
        <ul id="insightsList" class="mt-2 list-disc space-y-1 pl-5 text-sm" style="color: var(--color-muted)"></ul>
      </section>
    </main>

    <script>
      (async function () {
        const text = getComputedStyle(document.documentElement).getPropertyValue("--color-text").trim() || "#1F2937";
        const muted = getComputedStyle(document.documentElement).getPropertyValue("--color-muted").trim() || "#6B7280";
        const primary = getComputedStyle(document.documentElement).getPropertyValue("--color-primary").trim() || "#3B82F6";
        const border = getComputedStyle(document.documentElement).getPropertyValue("--color-border").trim() || "#E5E7EB";

        try {
          const data = await LibMetrics.api.getStudentAnalytics();
          document.getElementById("statBooksRead").textContent = data.total_books_read;
          document.getElementById("statMinutes").textContent = LibMetrics.formatMinutes(data.total_reading_time_minutes);
          document.getElementById("statStreak").textContent = `${data.current_streak_days} days`;
          document.getElementById("statMinsPerPage").textContent =
            data.minutes_per_page ? `${data.minutes_per_page}` : "—";

          const progress = data.book_progress || [];
          document.getElementById("progressList").innerHTML = progress.length
            ? progress.map((p) => `<li class="flex justify-between"><span>${p.title}</span><span>${Math.round(p.completion_percentage)}%</span></li>`).join("")
            : `<li style="color: ${muted}">No progress recorded yet.</li>`;

          const insights = [];
          if (data.current_streak_days > 0) insights.push(`You're on a ${data.current_streak_days}-day reading streak.`);
          if (data.total_books_read > 0) insights.push(`You've finished ${data.total_books_read} book(s).`);
          if (data.last_opened_book) insights.push(`Last opened: ${data.last_opened_book.title}.`);
          if (!insights.length) insights.push("Start a reading session to see insights here.");
          document.getElementById("insightsList").innerHTML = insights.map((i) => `<li>${i}</li>`).join("");

          if (progress.length) {
            new Chart(document.getElementById("chartProgress"), {
              type: "bar",
              data: {
                labels: progress.map((p) => p.title.slice(0, 18)),
                datasets: [{
                  label: "Completion %",
                  data: progress.map((p) => p.completion_percentage),
                  backgroundColor: "rgba(59, 130, 246, 0.25)",
                  borderColor: primary,
                  borderWidth: 1,
                }],
              },
              options: {
                plugins: { legend: { display: false } },
                scales: {
                  x: { ticks: { color: muted }, grid: { color: border } },
                  y: { max: 100, ticks: { color: muted }, grid: { color: border } },
                },
              },
            });
          }
        } catch (err) {
          document.getElementById("insightsList").innerHTML = `<li>${err.message}</li>`;
        }
      })();
    </script>
  </body>
</html>
