services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-elibrary}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-elibrary_secret}
      POSTGRES_DB: ${POSTGRES_DB:-elibrary}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-elibrary}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-elibrary}:${POSTGRES_PASSWORD:-elibrary_secret}@db:5432/${POSTGRES_DB:-elibrary}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             gunicorn app.main:app -c gunicorn.conf.py"

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend/src:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
  uploads_data:
