<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LibMetrics — Sign in</title>
    <link rel="stylesheet" href="./output.css" />
    <script src="./app.js"></script>
  </head>
  <body>
    <main class="min-h-screen">
      <div class="container-page flex min-h-screen items-center justify-center py-12">
        <section class="plate hoverable w-full max-w-md">
          <header class="mb-6">
            <h1 class="text-2xl font-semibold tracking-tight">LibMetrics</h1>
            <p class="mt-1 text-sm" style="color: var(--color-muted)">Sign in to continue.</p>
          </header>

          <div class="mb-5">
            <p class="mb-2 text-sm font-medium">Role</p>
            <div class="grid grid-cols-2 gap-2">
              <button id="roleStudent" type="button" class="btn btn-secondary" aria-pressed="true">Student</button>
              <button id="roleLibrarian" type="button" class="btn btn-secondary" aria-pressed="false">Librarian</button>
            </div>
          </div>

          <form id="loginForm" class="space-y-4">
            <label class="block">
              <span class="text-sm font-medium">Email</span>
              <input class="input mt-1" type="email" name="email" placeholder="alex@school.edu" autocomplete="email" required />
            </label>

            <label class="block">
              <span class="text-sm font-medium">Password</span>
              <input class="input mt-1" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            </label>

            <button class="btn btn-primary w-full" type="submit">Sign In</button>
          </form>

          <footer class="mt-5 text-center text-sm" style="color: var(--color-muted)">
            <a href="#" class="underline">Sign Up</a>
          </footer>
        </section>
      </div>
    </main>

    <script>
      (function () {
        let role = "student";

        const roleStudent = document.getElementById("roleStudent");
        const roleLibrarian = document.getElementById("roleLibrarian");
        const loginForm = document.getElementById("loginForm");

        function setRole(nextRole) {
          role = nextRole;
          const isStudent = role === "student";
          roleStudent.setAttribute("aria-pressed", String(isStudent));
          roleLibrarian.setAttribute("aria-pressed", String(!isStudent));

          roleStudent.style.borderColor = isStudent ? "var(--color-primary)" : "var(--color-border)";
          roleLibrarian.style.borderColor = !isStudent ? "var(--color-primary)" : "var(--color-border)";
        }

        roleStudent.addEventListener("click", () => setRole("student"));
        roleLibrarian.addEventListener("click", () => setRole("librarian"));
        setRole("student");

        loginForm.addEventListener("submit", (e) => {
          e.preventDefault();
          window.LibMetrics.setRole(role);
          window.location.href = role === "librarian" ? "./librarian-dashboard.html" : "./student-dashboard.html";
        });
      })();
    </script>
  </body>
</html>
